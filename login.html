<!DOCTYPE html>

<html>

<head>

<link
rel="stylesheet"

href="style.css">

</head>

<body>

<h1>

Admin Login

</h1>

<input

id="password"

type="password"

placeholder="Password">

<br><br>

<button

onclick="login()">

Login

</button>

<script>

function login(){

if(

document
.getElementById(
"password"
)

.value

===

"UPS2026"

){

window.location=

"admin.html";

}

else{

alert(

"Wrong Password"

);

}

}

</script>

</body>

</html>
